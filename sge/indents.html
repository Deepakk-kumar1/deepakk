<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://kit.fontawesome.com/5102d7ad4e.js" crossorigin="anonymous"></script>
<title>SGE Indent 2026</title>
<link rel="stylesheet" href="data.css">
</head>
<body>

<!-- LOGIN SCREEN -->

<div class="login-screen" id="loginScreen">

<div class="login-box">

<h2><i class="fa fa-user-lock"></i> Admin Login</h2>

<input
type="text"
id="username"
placeholder="Username"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="login()">
<i class="fa fa-arrow-right-to-bracket"></i> Login
</button>
<br>
<br>
<br>
<h6>&copy; Copyright 2026, deepakk1.in</h6>

</div>

</div>



<!-- MAIN CONTAINER -->

<div class="container">

<h1>SGE Digital Records : Indents 2026</h1>

<div class="top-bar">

<button
class="dark-btn"
onclick="toggleDarkMode()"
>
🌙 Dark Mode
</button>

<button
class="admin-btn"
onclick="toggleAdminPanel()"
>
<i class="fa-solid fa-user-lock"></i> Mr. Deepak (admin)
</button>

</div>

<!-- ADMIN PANEL -->

<div
class="admin-panel"
id="adminPanel"
>

<input
type="text"
id="sheetIDInput"
placeholder="Enter Google Sheet ID"
>

<button onclick="updateSheetID()">
Update Sheet ID
</button>

</div>

<!-- STATUS -->

<div
class="status"
id="status"
>
Loading Data...
</div>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search anything..."
>

<button onclick="searchData()">
Search
</button>

</div>

<!-- RESULTS -->

<div id="results"></div>
<br>
<br>
<h6>&copy; Copyright 2026 deepakk1.in, Design & Developed by Deepak Kumar</h6>
</div>

<script src="script.js"></script>
</body>
</html>
